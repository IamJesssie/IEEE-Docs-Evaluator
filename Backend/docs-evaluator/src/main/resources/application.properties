spring.application.name=IEEE Docs Evaluator

# 1. Import the untracked secrets file safely
spring.config.import=optional:classpath:application-secrets.properties

# 2. Supabase Transaction Pooler Connection
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Hibernate/JPA Configuration for the IEEE Evaluator
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. Google Service Account (used for Sheets — allowlist, roster, submissions)
app.google.spreadsheet-id=${GOOGLE_SHEET_ID:}
app.google.service-account-json=${GOOGLE_SERVICE_ACCOUNT_JSON:}
app.google.service-account-json-base64=${GOOGLE_SERVICE_ACCOUNT_JSON_BASE64:}

# 5. Google OAuth (used for Drive — reading student submission files)
#    Obtain these from Google Cloud Console and the OAuth Playground.
#    See OAuthCredentialConfig.java for instructions.
app.google.oauth.client-id=${GOOGLE_CLIENT_ID:}
app.google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
app.google.oauth.refresh-token=${GOOGLE_REFRESH_TOKEN:}

# 6. Runtime application settings
app.openrouter.http-referer=${OPENROUTER_HTTP_REFERER:https://localhost}
app.openrouter.app-title=${OPENROUTER_APP_TITLE:IEEE Docs Evaluator}

# 7. CORS (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}